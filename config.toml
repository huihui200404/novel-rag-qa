[project]
# 网页标题 —— 用更克制、有书卷气的命名
name = "文渊 · 现当代小说研读"

# 界面主色调 —— 深墨色，比灰蓝更有文学质感
primary_color = "#1a1a1a"

# 默认暗色模式，更有沉浸阅读感
default_theme = "dark"

# 允许切换主题
allow_theme_toggle = true

# 彻底隐藏 Chainlit 水印与默认文档
show_readme_as_default = false

# 项目描述（用于 meta 标签与 SEO）
description = "基于多本中国现当代小说的智能文学分析系统，提供结构化学术解读与文本细读。"

[features]
# 文件上传保持开启，但限制更严格
allow_file_upload = true
max_upload_size = 5

# 反馈功能保留
allow_feedback = true

# 允许消息编辑，便于学术追问
edit_message = true

[UI]
# 侧边栏标题 —— 更简洁
name = "文渊研读"

# 输入框提示 —— 更有文学引导性
input_placeholder = "输入你的问题，如：福贵的活着是一种选择还是一种宿命？"

# 使用 wide 布局，更有呼吸感
layout = "wide"

# 默认打开侧边栏
default_sidebar_state = "open"

# 对话链展示模式：full 显示思考过程，适合学术分析
cot = "full"

# 现代风格的提示框
alert_style = "modern"

# 加载自定义主题与样式
custom_css = "/public/custom.css"

# 语言强制中文
language = "zh-CN"

# 不显示确认新建对话弹窗
confirm_new_chat = false

# 自定义头像（可替换为 public 目录下的图片）
# default_avatar_file_url = "/public/avatar.png"
